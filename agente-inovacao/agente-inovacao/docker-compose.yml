version: '3.8'

services:
  backend:
    build: ./backend
    ports:
      - "8000:8000"
    environment:
      - DTA_PROXY_URL=https://proxy.dta.totvs.ai
      - DTA_API_KEY=${DTA_API_KEY:-sk-Q2m_kNH3orWeZX611razEQ}
      - GOOGLE_SHEETS_ENABLED=${GOOGLE_SHEETS_ENABLED:-false}
      - SPREADSHEET_ID=${SPREADSHEET_ID:-}
      - GOOGLE_CREDENTIALS_JSON=${GOOGLE_CREDENTIALS_JSON:-}
      - VALIDAR_EMAIL=${VALIDAR_EMAIL:-false}
      - EMAILS_AUTORIZADOS=${EMAILS_AUTORIZADOS:-}
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  frontend:
    build:
      context: ./frontend
      args:
        - VITE_API_URL=http://localhost:8000
    ports:
      - "3000:80"
    depends_on:
      - backend

networks:
  default:
    name: agente-inovacao-network
